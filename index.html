    var id = myId();
    if (!id) return;
    var url = SB_URL + "/rest/v1/messages?or=(sender_id.eq." + id + ",recipient_id.eq." + id + ")" +
      "&select=*&order=created_at.asc";
    if (lastCreatedAt) url += "&created_at=gt." + encodeURIComponent(lastCreatedAt);
    try {
      var r = await fetch(url, { headers: H });
      var rows = await r.json();
      if (!Array.isArray(rows) || !rows.length) {
        // still check for read-receipt updates on my own recent messages
        pollReadUpdates();
        return;
      }
      rows.forEach(function (m) {
        if (!messages.some(function (x) { return x.id === m.id; })) messages.push(m);
      });
      lastCreatedAt = rows[rows.length - 1].created_at;
      renderNew(rows);
      pollReadUpdates();
    } catch (e) {}
  }

  // Separate, light check: did the partner just read something of mine?
  var lastReadCheck = null;
  async function pollReadUpdates() {
    var id = myId();
    if (!id) return;
    try {
      var r = await fetch(
        SB_URL + "/rest/v1/messages?sender_id=eq." + id + "&read_at=not.is.null&select=id,read_at&order=read_at.desc&limit=20",
        { headers: H }
      );
      var rows = await r.json();
      if (!Array.isArray(rows)) return;
      rows.forEach(function (row) {
        var el = els.list.querySelector('[data-mid="' + row.id + '"] .tick');
        if (el && el.getAttribute("data-read") !== "1") {
          el.setAttribute("data-read", "1");
          el.textContent = "✓✓";
          el.classList.add("read");
        }
        var local = messages.find(function (m) { return m.id === row.id; });
        if (local) local.read_at = row.read_at;
      });
    } catch (e) {}
  }

  async function markRead() {
    var id = myId();
    if (!id) return;
    try {
      await fetch(SB_URL + "/rest/v1/messages?recipient_id=eq." + id + "&read_at=is.null", {
        method: "PATCH",
        headers: Object.assign({ Prefer: "return=minimal" }, HJ),
        body: JSON.stringify({ read_at: new Date().toISOString() }),
      });
      messages.forEach(function (m) { if (m.recipient_id === id && !m.read_at) m.read_at = new Date().toISOString(); });
    } catch (e) {}
  }

  // ── typing indicator ───────────────────────────────────────────────
  var typingTimer = null, lastTypingPing = 0;
  function announceTyping() {
    var id = myId();
    if (!id) return;
    clearTimeout(typingTimer);
    typingTimer = setTimeout(stopTyping, 2500);
    // Only the network call is throttled — every keystroke still resets the
    // "stop typing" timer above, so the indicator stays accurate on the other
    // side, it just doesn't hit the network on every single character.
    var now = Date.now();
    if (now - lastTypingPing < 1500) return;
    lastTypingPing = now;
    fetch(SB_URL + "/rest/v1/presence?on_conflict=account_id", {
      method: "POST",
      headers: Object.assign({ Prefer: "resolution=merge-duplicates,return=minimal" }, HJ),
      body: JSON.stringify({ account_id: id, is_typing: true, typing_updated_at: new Date().toISOString() }),
    }).catch(function () {});
  }
  function stopTyping() {
    var id = myId();
    if (!id) return;
    fetch(SB_URL + "/rest/v1/presence?on_conflict=account_id", {
      method: "POST",
      headers: Object.assign({ Prefer: "resolution=merge-duplicates,return=minimal" }, HJ),
      body: JSON.stringify({ account_id: id, is_typing: false }),
    }).catch(function () {});
  }

  var typingBubbleEl = null;
  async function pollTyping() {
    var p = await loadPresence();
    var fresh = !!(p && p.is_typing && p.typing_updated_at &&
      (Date.now() - new Date(p.typing_updated_at).getTime() < 6000));
    setTypingBubble(fresh);
  }
  function setTypingBubble(on) {
    if (on) {
      if (typingBubbleEl) return;
      typingBubbleEl = document.createElement("div");
      typingBubbleEl.className = "ntc-row them";
      typingBubbleEl.innerHTML =
        '<div class="ntc-bubble them ntc-typing"><span></span><span></span><span></span></div>';
      els.list.appendChild(typingBubbleEl);
      stickToBottomIfNeeded();
    } else if (typingBubbleEl) {
      typingBubbleEl.remove();
      typingBubbleEl = null;
    }
  }

  // ── rendering ──────────────────────────────────────────────────────
  function esc(s) {
    var d = document.createElement("div");
    d.textContent = s == null ? "" : String(s);
    return d.innerHTML;
  }

  function bubbleHTML(m) {
    var mine = m.sender_id === (me && me.id);
    var body =
      m.type === "photo" ? '<img src="' + m.media_url + '" alt="" />' :
      m.type === "audio" ? '<audio src="' + m.media_url + '" controls></audio>' :
      esc(mine ? m.body : (m.translated_body || m.body));

    var quote = "";
    if (m.reply_preview) {
      var whoMine = m.reply_sender === (me && me.id);
      quote =
        '<div class="ntc-quote" data-qid="' + m.reply_to + '">' +
          '<b>' + (whoMine ? esc(t().you) : esc(partner ? partner.name : "")) + '</b>' +
          '<span>' + esc(m.reply_preview) + '</span>' +
        '</div>';
    }

    var time = m.created_at
      ? new Date(m.created_at).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })
      : "";
    var tick = mine
      ? '<span class="tick" data-read="' + (m.read_at ? "1" : "0") + '">' + (m.read_at ? "✓✓" : "✓") + '</span>'
      : "";

    return (
      '<div class="ntc-row ' + (mine ? "me" : "them") + '" data-mid="' + m.id + '">' +
        '<div class="ntc-bubble ' + (mine ? "me" : "them") + '">' +
          quote +
          '<div class="ntc-content">' +
            (m.type === "text" ? '<span class="ntc-text">' + body + '</span>' : body) +
          '</div>' +
          '<div class="ntc-meta">' + tick + '<span class="ntc-time-txt">' + time + '</span></div>' +
        '</div>' +
      '</div>'
    );
  }

  function isNearBottom() {
    var l = els.list;
    return l.scrollHeight - l.scrollTop - l.clientHeight < 80;
  }
  function stickToBottomIfNeeded() {
    if (isNearBottom()) els.list.scrollTop = els.list.scrollHeight;
  }

  function renderAll() {
    els.list.innerHTML = messages.map(bubbleHTML).join("");
    els.list.scrollTop = els.list.scrollHeight;
    hookRows();
  }

  function renderNew(rows) {
    var wasBottom = isNearBottom();
    var freshRows = rows.filter(function (m) {
      return !els.list.querySelector('[data-mid="' + m.id + '"]');
    });
    if (!freshRows.length) { if (rows.some(function (m) { return m.recipient_id === (me && me.id); })) markRead(); return; }
    var frag = document.createElement("div");
    frag.innerHTML = freshRows.map(bubbleHTML).join("");
    var newNodes = [];
    while (frag.firstChild) {
      var n = frag.firstChild;
      els.list.appendChild(n);
      newNodes.push(n);
    }
    hookRows();
    newNodes.forEach(popIn);
    if (wasBottom) els.list.scrollTop = els.list.scrollHeight;
    if (freshRows.some(function (m) { return m.recipient_id === (me && me.id); })) markRead();
  }

  // ── reply gestures (lighter than before: only on rows, no global scans) ──
  function hookRows() {
    var rows = els.list.querySelectorAll(".ntc-row:not([data-hooked])");
    rows.forEach(function (row) {
      row.setAttribute("data-hooked", "1");
      var x0 = 0, y0 = 0, held = null, dragging = false, cancelled = false;
      row.addEventListener("touchstart", function (e) {
        var tt = e.touches[0]; x0 = tt.clientX; y0 = tt.clientY;
        dragging = false; cancelled = false;
        held = setTimeout(function () { startReply(row); held = null; }, 320);
      }, { passive: true });
      row.addEventListener("touchmove", function (e) {
        var dx = e.touches[0].clientX - x0;
        var dy = e.touches[0].clientY - y0;
        // ANY real movement — including a vertical scroll — cancels the hold.
        // Only commit to the swipe-to-reply gesture once it's clearly horizontal.
        if (!cancelled && (Math.abs(dx) > 6 || Math.abs(dy) > 6)) {
          clearTimeout(held); held = null; cancelled = true;
        }
        if (Math.abs(dx) > 14 && Math.abs(dx) > Math.abs(dy) * 1.8) {
          dragging = true;
          row.style.transition = "none";
          row.style.transform = "translateX(" + Math.max(-60, Math.min(60, dx)) * 0.5 + "px)";
        }
      }, { passive: true });
      row.addEventListener("touchend", function (e) {
        clearTimeout(held); held = null;
        var dx = e.changedTouches[0].clientX - x0;
        row.style.transition = "transform 150ms ease";
        row.style.transform = "";
        if (dragging && Math.abs(dx) > 44) startReply(row);
        dragging = false;
      }, { passive: true });
      row.addEventListener("touchcancel", function () {
        clearTimeout(held); held = null; dragging = false;
        row.style.transform = "";
      }, { passive: true });
    });

    // tapping a quote jumps to the original
    els.list.querySelectorAll(".ntc-quote:not([data-hooked])").forEach(function (q) {
      q.setAttribute("data-hooked", "1");
      q.addEventListener("click", function () {
        var id = q.getAttribute("data-qid");
        var target = els.list.querySelector('[data-mid="' + id + '"]');
        if (!target) return;
        target.scrollIntoView({ behavior: "smooth", block: "center" });
        var b = target.querySelector(".ntc-bubble");
        b.style.boxShadow = "0 0 0 2px #A97CEC";
        setTimeout(function () { b.style.boxShadow = ""; }, 700);
      });
    });
  }

  function startReply(row) {
    var id = row.getAttribute("data-mid");
    var m = messages.find(function (x) { return x.id === id; });
    if (!m) return;
    var mine = m.sender_id === (me && me.id);
    var text = m.type === "photo" ? "📷" : m.type === "audio" ? "🎙️" : (mine ? m.body : (m.translated_body || m.body));
    pendingReply = { id: id, text: String(text).slice(0, 120), mine: mine,
      senderName: mine ? t().you : (partner ? partner.name : "") };
    renderReplyStrip();
    els.field.focus();
    if (navigator.vibrate) navigator.vibrate(8);
  }

  function renderReplyStrip() {
    if (els.replyStrip) { els.replyStrip.remove(); els.replyStrip = null; }
    if (!pendingReply) return;
    var strip = document.createElement("div");
    strip.className = "ntc-reply-strip";
    strip.innerHTML =
      '<div class="bar"></div>' +
      '<div class="col"><b>' + esc(pendingReply.senderName) + '</b><span>' + esc(pendingReply.text) + '</span></div>' +
      '<button class="x">✕</button>';
    strip.querySelector(".x").onclick = function () { pendingReply = null; renderReplyStrip(); };
    els.footer.parentNode.insertBefore(strip, els.footer);
    els.replyStrip = strip;
  }

  // ── sending ────────────────────────────────────────────────────────
  async function sendText() {
    var text = els.field.value.trim();
    if (!text) return;
    els.field.value = "";
    autoGrow();
    stopTyping();
    setAttachCollapsed(false);

    var replyRef = pendingReply;
    pendingReply = null;
    renderReplyStrip();

    var optimistic = {
      id: "tmp-" + Date.now(),
      sender_id: me.id, recipient_id: partner.id,
      type: "text", body: text, translated_body: text,
      created_at: new Date().toISOString(), read_at: null,
      reply_to: replyRef ? replyRef.id : null,
      reply_preview: replyRef ? replyRef.text : null,
      reply_sender: replyRef ? (replyRef.mine ? me.id : null) : null,
    };
    messages.push(optimistic);
    renderNewOptimistic(optimistic);

    try {
      var r = await fetch(SB_URL + "/rest/v1/messages", {
        method: "POST",
        headers: Object.assign({ Prefer: "return=representation" }, HJ),
        body: JSON.stringify({
          sender_id: me.id, recipient_id: partner.id, type: "text",
          body: text, translated_body: text,
          reply_to: optimistic.reply_to, reply_preview: optimistic.reply_preview, reply_sender: optimistic.reply_sender,
        }),
      });
      var rows = await r.json();
      var saved = Array.isArray(rows) ? rows[0] : null;
      if (saved) {
        var idx = messages.findIndex(function (m) { return m.id === optimistic.id; });
        if (idx >= 0) messages[idx] = saved;
        var row = els.list.querySelector('[data-mid="' + optimistic.id + '"]');
        if (row) row.setAttribute("data-mid", saved.id);
        lastCreatedAt = saved.created_at;

        if (me.chat_lang && partner.chat_lang && me.chat_lang !== partner.chat_lang) {
          var translated = await translate(text, me.chat_lang, partner.chat_lang);
          if (translated && translated !== text) {
            await fetch(SB_URL + "/rest/v1/messages?id=eq." + saved.id, {
              method: "PATCH", headers: Object.assign({ Prefer: "return=minimal" }, HJ),
              body: JSON.stringify({ translated_body: translated }),
            });
          }
        }
      }
    } catch (e) {}
  }

  function popIn(node) {
    var bubble = node.querySelector(".ntc-bubble");
    if (!bubble) return;
    bubble.style.transition = "none";
    bubble.style.opacity = "0";
    bubble.style.transform = "scale(.55)";
    // A single requestAnimationFrame is not always enough — the browser can still
    // batch the "small" state and the "full size" state into the very same paint,
    // skipping the animation entirely. Two nested frames guarantees a real paint
    // happens in between, so the transition is never silently skipped.
    requestAnimationFrame(function () {
      void bubble.offsetHeight;
      requestAnimationFrame(function () {
        bubble.style.transition = "transform 180ms cubic-bezier(.2,.9,.3,1.05), opacity 130ms ease";
        bubble.style.opacity = "1";
        bubble.style.transform = "scale(1)";
      });
    });
  }

  function renderNewOptimistic(m) {
    var frag = document.createElement("div");
    frag.innerHTML = bubbleHTML(m);
    var node = frag.firstChild;
    els.list.appendChild(node);
    hookRows();
    popIn(node);
    // I just sent this — always bring it into view, keyboard height included.
    layout();
    requestAnimationFrame(function () { els.list.scrollTop = els.list.scrollHeight; });
    setTimeout(function () { els.list.scrollTop = els.list.scrollHeight; }, 120);
  }

  // ── back / mic: delegate to the still-mounted (hidden) native chat ──
  function forwardTo(selector) {
    if (!nativeWrap) return;
    var el = nativeWrap.querySelector(selector);
    if (el) el.click();
  }
  function forwardToIcon(index) {
    if (!nativeWrap) return;
    var buttons = nativeWrap.querySelectorAll(".tc-icon-btn");
    var el = buttons[index];
    if (el) el.click();
  }

  // ── photo: handled entirely here now — upload straight to the same storage
  //    bucket the rest of the app uses, with our own quick preview ──────────
  var BUCKET = "capsules-media";
  var photoInput = null;
  function ensurePhotoInput() {
    if (photoInput) return photoInput;
    photoInput = document.createElement("input");
    photoInput.type = "file";
    photoInput.accept = "image/*";
    photoInput.style.display = "none";
    photoInput.addEventListener("change", function (e) {
      var file = e.target.files && e.target.files[0];
      e.target.value = "";
      if (file) openPhotoPreview(file);
    });
    document.body.appendChild(photoInput);
    return photoInput;
  }

  var photoModalEl = null;
  function openPhotoPreview(file) {
    var url = URL.createObjectURL(file);
    var st = { zoom: 1, x: 50, y: 50 };

    var back = document.createElement("div");
    back.className = "ntc-photo-modal";
    back.innerHTML =
      '<div class="ntc-photo-sheet">' +
        '<div class="ntc-photo-stage"><div class="ntc-photo-img"></div></div>' +
        '<div class="ntc-photo-hint">' + esc(t().cropHint) + '</div>' +
        '<div class="ntc-photo-actions">' +
          '<button class="ntc-photo-cancel">' + esc(t().cancel) + '</button>' +
          '<button class="ntc-photo-send">➤</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(back);
    photoModalEl = back;

    var stage = back.querySelector(".ntc-photo-stage");
    var img = back.querySelector(".ntc-photo-img");
    function paint() {
      img.style.backgroundImage = "url(" + url + ")";
      img.style.backgroundSize = (st.zoom * 100) + "%";
      img.style.backgroundPosition = st.x + "% " + st.y + "%";
    }
    paint();

    // drag to reposition, pinch to zoom — same idea as the profile-photo cropper
    var ptrs = new Map(), drag = null, pinch = null;
    function dist() {
      var a = Array.from(ptrs.values());
      return a.length < 2 ? 0 : Math.hypot(a[0].x - a[1].x, a[0].y - a[1].y);
    }
    stage.addEventListener("pointerdown", function (e) {
      stage.setPointerCapture && stage.setPointerCapture(e.pointerId);
      ptrs.set(e.pointerId, { x: e.clientX, y: e.clientY });
      if (ptrs.size === 1) drag = { x: e.clientX, y: e.clientY };
      else if (ptrs.size === 2) { pinch = { d: dist(), z: st.zoom }; drag = null; }
    });
    stage.addEventListener("pointermove", function (e) {
      if (!ptrs.has(e.pointerId)) return;
      ptrs.set(e.pointerId, { x: e.clientX, y: e.clientY });
      if (ptrs.size >= 2 && pinch) {
        var nd = dist();
        if (nd > 0 && pinch.d > 0) { st.zoom = Math.min(4, Math.max(1, pinch.z * (nd / pinch.d))); paint(); }
        return;
      }
      if (drag) {
        var r = stage.getBoundingClientRect();
        st.x = Math.min(100, Math.max(0, st.x - ((e.clientX - drag.x) / r.width) * 100));
        st.y = Math.min(100, Math.max(0, st.y - ((e.clientY - drag.y) / r.height) * 100));
        drag = { x: e.clientX, y: e.clientY };
        paint();
      }
    });
    function up(e) { ptrs.delete(e.pointerId); if (ptrs.size < 2) pinch = null; if (!ptrs.size) drag = null; }
    stage.addEventListener("pointerup", up);
    stage.addEventListener("pointercancel", up);

    back.querySelector(".ntc-photo-cancel").onclick = function () {
      URL.revokeObjectURL(url);
      back.remove();
      photoModalEl = null;
    };
    back.querySelector(".ntc-photo-send").onclick = async function () {
      var btn = back.querySelector(".ntc-photo-send");
      btn.disabled = true;
      btn.textContent = "…";
      try {
        // bake the crop (zoom + position) into a real image before uploading
        var image = new Image();
        await new Promise(function (res, rej) { image.onload = res; image.onerror = rej; image.src = url; });
        var SIZE = 1400;
        var cv = document.createElement("canvas");
        cv.width = SIZE; cv.height = SIZE;
        var cx = cv.getContext("2d");
        var scale = Math.max(SIZE / image.width, SIZE / image.height) * st.zoom;
        var dw = image.width * scale, dh = image.height * scale;
        cx.fillStyle = "#000"; cx.fillRect(0, 0, SIZE, SIZE);
        cx.drawImage(image, (SIZE - dw) * (st.x / 100), (SIZE - dh) * (st.y / 100), dw, dh);
        var blob = await new Promise(function (res) { cv.toBlob(res, "image/jpeg", 0.9); });

        var path = "messages/" + me.id + "-" + Date.now() + ".jpg";
        var upRes = await fetch(SB_URL + "/storage/v1/object/" + BUCKET + "/" + path, {
          method: "POST",
          headers: { apikey: SB_KEY, Authorization: "Bearer " + SB_KEY, "Content-Type": "image/jpeg" },
          body: blob,
        });
        if (!upRes.ok) throw new Error("upload failed: " + upRes.status);
        var publicUrl = SB_URL + "/storage/v1/object/public/" + BUCKET + "/" + path;

        var r = await fetch(SB_URL + "/rest/v1/messages", {
          method: "POST",
          headers: Object.assign({ Prefer: "return=representation" }, HJ),
          body: JSON.stringify({ sender_id: me.id, recipient_id: partner.id, type: "photo", media_url: publicUrl }),
        });
        var rows = await r.json();
        var saved = Array.isArray(rows) ? rows[0] : null;
        if (saved) {
          saved.__new = true;
          if (!messages.some(function (m) { return m.id === saved.id; })) {
            messages.push(saved);
            renderNew([saved]);
            lastCreatedAt = saved.created_at;
          }
        }
        URL.revokeObjectURL(url);
        back.remove();
        photoModalEl = null;
      } catch (err) {
        btn.disabled = false;
        btn.textContent = "➤";
        window.alert("Erreur: " + (err && err.message || err));
      }
    };
  }

  // ── keyboard: simple, direct visualViewport handling (no guards, no fights) ──
  // Adjust the frame's position/size to match the visual viewport. This alone must
  // NEVER force a scroll — iOS also fires visualViewport "scroll" while the message
  // list itself is being scrolled with the keyboard open, and snapping to the bottom
  // on every one of those was what made the conversation bounce while reading.
  function updateFrame() {
    var vv = window.visualViewport;
    var top = vv ? vv.offsetTop : 0;
    var height = vv ? vv.height : window.innerHeight;
    els.wrap.style.top = top + "px";
    els.wrap.style.height = height + "px";
  }

  // Only called for a genuine keyboard open/close (or right after I send) — this is
  // the one that's allowed to snap to the newest message.
  function layout() {
    updateFrame();
    requestAnimationFrame(function () { els.list.scrollTop = els.list.scrollHeight; });
    setTimeout(function () { els.list.scrollTop = els.list.scrollHeight; }, 260);
  }

  // ── the ⋯ dropdown ─────────────────────────────────────────────────
  var openMenu = null;
  function closeMenu() {
    if (openMenu) { openMenu.remove(); openMenu = null; }
    var b = els.menuWrap.querySelector(".ntc-menu-backdrop");
    if (b) b.remove();
  }
  function toggleMenu() {
    if (openMenu) { closeMenu(); return; }
    var backdrop = document.createElement("div");
    backdrop.className = "ntc-menu-backdrop";
    backdrop.onclick = closeMenu;
    els.menuWrap.appendChild(backdrop);

    var drop = document.createElement("div");
    drop.className = "ntc-menu-drop";
    var item = document.createElement("button");
    item.className = "ntc-menu-item";
    item.textContent = "🗑  " + t().delete;
    item.onclick = function () { closeMenu(); deleteConversation(); };
    drop.appendChild(item);
    els.menuWrap.appendChild(drop);
    openMenu = drop;
  }

  // ── delete conversation ────────────────────────────────────────────
  async function deleteConversation() {
    if (!window.confirm(t().confirmDelete)) return;
    try {
      var now = new Date().toISOString();
      await fetch(SB_URL + "/rest/v1/accounts?id=eq." + me.id, {
        method: "PATCH", headers: Object.assign({ Prefer: "return=minimal" }, HJ),
        body: JSON.stringify({ chat_cleared_at: now }),
      });
      me.chat_cleared_at = now;
      messages = messages.filter(function (m) { return new Date(m.created_at) > new Date(now); });
      renderAll();
    } catch (e) {}
  }

  // ── build the DOM once ─────────────────────────────────────────────
  // A handful of glowing stars + a shooting star — Eva liked these, and they're
  // cheap here since they sit behind a screen that's usually fully opaque anyway
  // (they only cost anything while actually visible, same as the rest of the app).
  function buildStarsHTML() {
    var stars = "";
    for (var i = 0; i < 18; i++) {
      var top = Math.random() * 100, left = Math.random() * 100;
      var size = (Math.random() * 2 + 1).toFixed(1);
      var delay = (Math.random() * 4).toFixed(2), dur = (2 + Math.random() * 3).toFixed(2);
      stars += '<div class="tc-star" style="top:' + top + '%;left:' + left + '%;' +
        'width:' + size + 'px;height:' + size + 'px;' +
        'animation-delay:' + delay + 's;animation-duration:' + dur + 's;"></div>';
    }
    var shoot = '';
    for (var j = 0; j < 2; j++) {
      var t2 = 5 + Math.random() * 30, l2 = 30 + Math.random() * 55;
      var angle = 25 + Math.random() * 20;
      var d2 = (j * 6 + Math.random() * 5).toFixed(2), dur2 = (6 + Math.random() * 4).toFixed(2);
      shoot += '<div class="tc-shooting-star" style="top:' + t2 + '%;left:' + l2 + '%;transform:rotate(' + angle + 'deg);">' +
        '<div class="tc-shooting-star-inner" style="animation-delay:' + d2 + 's;animation-duration:' + dur2 + 's;"></div></div>';
    }
    return '<div id="ntc-stars">' + stars + shoot + '</div>';
  }

  function build() {
    var wrap = document.createElement("div");
    wrap.id = "ntc-wrap";
    wrap.innerHTML =
      buildStarsHTML() +
      '<div class="ntc-header">' +
        '<button class="ntc-back">←</button>' +
        '<div class="ntc-avatar"></div>' +

              '<path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/>' +

    document.body.appendChild(wrap);

    // Tapping the send button naturally steals focus from the field, which is what

    els.send.addEventListener("mousedown", function (e) { e.preventDefault(); });

      sendText();

    };
    els.field.addEventListener("keydown", function (e) {

    });
    els.field.addEventListener("input", function () {
      autoGrow(); announceTyping();
      setAttachCollapsed(els.field.value.trim().length > 0);

    els.field.addEventListener("focus", function () {

  // ── show / hide, wired to the native chat's own open/close ─────────

<script>
/* ═══════════════════════════════════════════════════════════════════
   Local sandbox chat — entirely in-memory, no Supabase, no network at
   all. A safe place to try animations/layout without touching the
   real conversation. Reachable from Settings.
   ═══════════════════════════════════════════════════════════════════ */
(function () {
  var sandboxMessages = [];
  var els = {};
  var replyTimer = null;

  function esc(s) { var d = document.createElement("div"); d.textContent = s == null ? "" : String(s); return d.innerHTML; }

  function bubbleHTML(m) {
    return (
      '<div class="ntc-row ' + (m.mine ? "me" : "them") + '">' +
        '<div class="ntc-bubble ' + (m.mine ? "me" : "them") + '">' +
          '<div class="ntc-content"><span class="ntc-text">' + esc(m.text) + '</span></div>' +
          '<div class="ntc-meta"><span class="ntc-time-txt">' + m.time + '</span></div>' +
        '</div>' +
      '</div>'
    );
  }

  function popIn(node) {
    var bubble = node.querySelector(".ntc-bubble");
    if (!bubble) return;
    bubble.style.transition = "none";
    bubble.style.opacity = "0";
    bubble.style.transform = "scale(.55)";
    requestAnimationFrame(function () {
      void bubble.offsetHeight;
      requestAnimationFrame(function () {
        bubble.style.transition = "transform 180ms cubic-bezier(.2,.9,.3,1.05), opacity 130ms ease";
        bubble.style.opacity = "1";
        bubble.style.transform = "scale(1)";
      });
    });
  }

  function nowStr() { return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }); }
  function isNearBottom() { var l = els.list; return l.scrollHeight - l.scrollTop - l.clientHeight < 80; }

  function addMessage(text, mine) {
    var m = { text: text, mine: mine, time: nowStr() };
    sandboxMessages.push(m);
    var wasBottom = isNearBottom();
    var frag = document.createElement("div");
    frag.innerHTML = bubbleHTML(m);
    var node = frag.firstChild;
    els.list.appendChild(node);
    popIn(node);
    if (wasBottom || mine) els.list.scrollTop = els.list.scrollHeight;
  }

  function autoGrow() {
    var field = els.field;
    field.style.transition = "none";
    field.style.height = "auto";
    var next = Math.min(field.scrollHeight, 120) + "px";
    void field.offsetHeight;
    field.style.transition = "";
    requestAnimationFrame(function () { field.style.height = next; });
  }

  function send() {
    var text = els.field.value.trim();
    if (!text) return;
    els.field.value = "";
    autoGrow();
    addMessage(text, true);
    // a friendly canned reply after a short beat, purely to test the "them" bubble too
    clearTimeout(replyTimer);
    replyTimer = setTimeout(function () {
      var replies = ["تمام 👍", "حلو كتير", "وأنا كمان 💜", "هه صح", "تمام تمام"];
      addMessage(replies[Math.floor(Math.random() * replies.length)], false);
    }, 900);
  }

  function close() {
    document.getElementById("ntc-sandbox").remove();
  }

  function open() {
    if (document.getElementById("ntc-sandbox")) return;
    var wrap = document.createElement("div");
    wrap.id = "ntc-sandbox";
    wrap.innerHTML =
      '<div class="ntc-header">' +
        '<button class="ntc-back">←</button>' +
        '<div class="ntc-avatar" style="background:#E0555A"></div>' +
        '<div class="ntc-hd-text"><div class="ntc-name">تجربة محلية</div>' +
        '<div class="ntc-status">بدون اتصال — للتجربة بس</div></div>' +
      '</div>' +
      '<div class="ntc-list"></div>' +
      '<div class="ntc-footer">' +
        '<textarea class="ntc-field" rows="1" placeholder="اكتبي شي هون..."></textarea>' +
        '<button class="ntc-send">' +
          '<svg viewBox="0 0 24 24" width="17" height="17" fill="currentColor"><path d="M3 11.5L21 3l-8.5 18-2.2-7.3L3 11.5z"/></svg>' +
        '</button>' +
      '</div>';
    document.body.appendChild(wrap);

    els.wrap = wrap;
    els.list = wrap.querySelector(".ntc-list");
    els.field = wrap.querySelector(".ntc-field");
    var sendBtn = wrap.querySelector(".ntc-send");
    var backBtn = wrap.querySelector(".ntc-back");

    backBtn.onclick = close;
    sendBtn.addEventListener("mousedown", function (e) { e.preventDefault(); });
    sendBtn.addEventListener("pointerdown", function (e) { e.preventDefault(); });
    sendBtn.onclick = function () { send(); els.field.focus(); };
    els.field.addEventListener("keydown", function (e) {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
    });
    els.field.addEventListener("input", autoGrow);

    function layout() {
      var vv = window.visualViewport;
      wrap.style.top = (vv ? vv.offsetTop : 0) + "px";
      wrap.style.height = (vv ? vv.height : window.innerHeight) + "px";
      requestAnimationFrame(function () { els.list.scrollTop = els.list.scrollHeight; });
    }
    if (window.visualViewport) window.visualViewport.addEventListener("resize", layout);
    els.field.addEventListener("focus", function () {
      [0, 30, 80, 160, 300].forEach(function (d) { setTimeout(layout, d); });
    });
    els.field.addEventListener("blur", function () {
      [0, 60, 150, 300].forEach(function (d) { setTimeout(layout, d); });
    });
    layout();

    if (!sandboxMessages.length) {
      addMessage("هاد كلام تجريبي بس — ما بينحفظ ولا بيوصل لحدا 🙂", false);
    } else {
      sandboxMessages.forEach(function (m) {
        var frag = document.createElement("div");
        frag.innerHTML = bubbleHTML(m);
        els.list.appendChild(frag.firstChild);
      });
      els.list.scrollTop = els.list.scrollHeight;
    }
  }

  var style = document.createElement("style");
  style.textContent = [
    "#ntc-sandbox{position:fixed;left:0;right:0;top:0;z-index:700;display:flex;flex-direction:column;",
    "background:radial-gradient(ellipse at 50% -10%,#2f1d52 0%,#1c1338 45%,#150e28 75%,#100b20 100%);",
    "font-family:-apple-system,sans-serif;width:100%;max-width:100vw;overflow-x:hidden;",
    "transition:top 130ms ease,height 130ms ease;}",
    "#ntc-sandbox .ntc-header{flex:0 0 auto;display:flex;align-items:center;gap:11px;",
    "padding:calc(13px + env(safe-area-inset-top)) 14px 13px;}",
    "#ntc-sandbox .ntc-back{background:rgba(255,255,255,.08);border:none;color:#F4EEFF;",
    "width:34px;height:34px;border-radius:50%;font-size:16px;flex:none;}",
    "#ntc-sandbox .ntc-avatar{width:40px;height:40px;border-radius:50%;flex:none;}",
    "#ntc-sandbox .ntc-name{font-size:15.5px;font-weight:700;color:#F4EEFF;}",
    "#ntc-sandbox .ntc-status{font-size:11px;color:#E0555A;}",
    "#ntc-sandbox .ntc-list{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 10px;}",
    "#ntc-sandbox .ntc-footer{flex:0 0 auto;display:flex;align-items:flex-end;gap:8px;",
    "padding:8px 10px calc(8px + env(safe-area-inset-bottom));}",
    "#ntc-sandbox .ntc-field{flex:1;min-width:0;max-height:120px;background:#221B36;border:none;",
    "border-radius:20px;color:#F4EEFF;font-size:15px;padding:10px 14px;resize:none;",
    "font-family:inherit;line-height:1.4;transition:height 110ms ease;}",
    "#ntc-sandbox .ntc-send{width:38px;height:38px;border-radius:50%;border:none;flex:none;",
    "display:flex;align-items:center;justify-content:center;",
    "background:linear-gradient(135deg,#A97CEC,#6A4BB0);color:#fff;}",
  ].join("\n");
  document.head.appendChild(style);

  window.tcOpenSandbox = open;

  // add a small entry point in Settings
  function placeButton() {
    if (document.getElementById("tc-sandbox-card")) return;
    var fl = document.querySelector(".tc-font-list");
    var screen = fl ? fl.closest(".tc-screen") : null;
    if (!screen) return;
    var card = document.createElement("div");
    card.className = "tc-settings-card";
    card.id = "tc-sandbox-card";
    card.style.cssText = "display:flex;flex-direction:column;gap:8px";
    var title = document.createElement("div");
    title.className = "tc-set-section-title";
    title.style.margin = "0";
    title.textContent = "🧪 وضع التجربة";
    var hint = document.createElement("div");
    hint.style.cssText = "font-size:0.78em;line-height:1.45;opacity:.72";
    hint.textContent = "محادثة محلية للتجربة فقط — ما بتتحفظ وما بتوصل لحدا.";
    var btn = document.createElement("button");
    btn.className = "tc-btn-secondary";
    btn.textContent = "افتحي محادثة تجريبية";
    btn.onclick = open;
    card.appendChild(title); card.appendChild(hint); card.appendChild(btn);
    var anchor = screen.querySelector(".tc-settings-card");
    if (anchor && anchor.parentNode) anchor.parentNode.insertBefore(card, anchor.nextSibling);
    else screen.appendChild(card);
  }
  var mo = new MutationObserver(function () {
    if (mo._t) clearTimeout(mo._t);
    mo._t = setTimeout(placeButton, 60);
  });
  function start() {
    if (!document.body) return setTimeout(start, 50);
    mo.observe(document.body, { childList: true, subtree: true });
    placeButton();
  }
  window.addEventListener("load", start);
})();
</script>
</body>
</html>
